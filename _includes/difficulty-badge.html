{% assign diff = include.difficulty | default: "green" %}
<div class="difficulty-badge difficulty-{{ diff }}" title="{% case diff %}{% when 'green' %}Easy{% when 'blue' %}Intermediate{% when 'black' %}Hard{% when 'double-black' %}Very Hard{% when 'extreme' %}Extreme{% endcase %}" aria-label="{% case diff %}{% when 'green' %}Easy{% when 'blue' %}Intermediate{% when 'black' %}Hard{% when 'double-black' %}Very Hard{% when 'extreme' %}Extreme{% endcase %}">
  {% if diff == 'green' %}
    <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><circle cx="12" cy="12" r="10"/></svg>
  {% elsif diff == 'blue' %}
    <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><rect x="2" y="2" width="20" height="20" rx="2"/></svg>
  {% elsif diff == 'black' %}
    <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 1.5 L22.5 12 L12 22.5 L1.5 12 Z"/></svg>
  {% elsif diff == 'double-black' %}
    <svg viewBox="0 0 32 24" fill="currentColor" aria-hidden="true">
      <path d="M8 1.5 L15.5 12 L8 22.5 L0.5 12 Z"/>
      <path d="M24 1.5 L31.5 12 L24 22.5 L16.5 12 Z"/>
    </svg>
  {% elsif diff == 'extreme' %}
    <svg viewBox="0 0 32 24" fill="currentColor" aria-hidden="true">
      <path d="M8 1.5 L15.5 12 L8 22.5 L0.5 12 Z"/>
      <text x="8" y="12" dominant-baseline="central" text-anchor="middle" font-size="13" font-weight="800" fill="white" font-family="system-ui,sans-serif">E</text>
      <path d="M24 1.5 L31.5 12 L24 22.5 L16.5 12 Z"/>
      <text x="24" y="12" dominant-baseline="central" text-anchor="middle" font-size="13" font-weight="800" fill="white" font-family="system-ui,sans-serif">X</text>
    </svg>
  {% endif %}
</div>
