title: "Run Santa Fe"
tagline: "Curated trail runs in Northern New Mexico"
description: >-
  A curated guide to the best trail runs in Northern New Mexico from mellow foothills cruisers to
  serious alpine adventures.

# GitHub Pages URL — update if using a custom domain
# If repo is named santa-fe-runs.github.io, set baseurl to ""
baseurl: ""
url: "https://santafe.run"

# Collections
collections:
  runs:
    output: true
    permalink: /runs/:name/

defaults:
  - scope:
      path: ""
      type: "runs"
    values:
      layout: "run"

# Build
markdown: kramdown
kramdown:
  input: GFM

sass:
  sass_dir: _sass
  style: compressed

plugins:
  - jekyll-feed
  - jekyll-seo-tag

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor/
  - .github/
  - "*.gemspec"
  - node_modules/
  - README.md
