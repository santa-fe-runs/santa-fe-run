
- id: la-tierra
  name: La Tierra
  tagline: Fast runs near town
  description: >-
    The La Tierra trail system is right next to town and provides access to 25 miles of flatter (by Santa Fe standards) trails.
    A great trail system for newer trail runners and those looking for shorter, faster runs.
    All the trails provide views of the Jemez and Sangre de Cristos.
    The terrain is sandy, open Pinyon-Juniper Savannah with little shade.
    We suggest running in the Fall, Winter, and Spring to avoid the heat of summer.
  difficulty: green
  elevation_range:
    min: 6900
    max: 7300
  center:
    lat: 35.71
    lng: -105.97
  geojson: /assets/areas/la-tierra.geojson

- id: dale-ball
  name: Dale Ball
  tagline: A trail for every runner, right in town.
  description: >-
    Dale Ball trail system is just minutes from downtown with great well signed single-track.
    There are over 25 miles of trails with a myriad of possible loops.
    You can climb Atalaya and Picacho, go for a mild 3 mile cruise with 500 feet of gain, or put it all together for 20 miles of challenging terrain.
    The terrain is semi-shaded with pinyon and some ponderosa and trails can be quite rocky.
    Dale Ball is great for year-round running, but can be icy in winter.
  difficulty: blue
  elevation_range:
    min: 7000
    max: 8200
  center:
    lat: 35.687
    lng: -105.90
  geojson: /assets/areas/dale-ball.geojson

- id: winsor-corridor
  name: Winsor Corridor
  tagline: The heart of Santa Fe's montane trail system
  description: >-
    The Winsor Trail is the heart of Santa Fe's montane forest trail.
    The Winsor is the trunk trail with a series of branching trails forming a steep trail system running from town up to Ski Santa Fe.
    Many runners' favorite routes are in this area.
    There are many trail heads along Hyde Park Road from which to start your runs.
    We suggest running in the Spring, Summer, and Fall to avoid winter snow and ice.
  difficulty: black
  elevation_range:
    min: 7500
    max: 11000
  center:
    lat: 35.76
    lng: -105.85
  geojson: /assets/areas/winsor-corridor.geojson

- id: pecos-wilderness
  name: Pecos Wilderness
  tagline: Alpine adventures in the Sangre de Cristos
  description: >-
    The Pecos Wilderness is where real adventure begins.
    In summer it offers a vast playground for Santa Feans looking to escape summer heat and test themselves at altitude.
    Santa Feans almost exclusively access the wilderness from the Ski Basin trailhead.
    If you venture into the Wilderness expect a lot of elevation gain, incredible views, and ever changing weather.
  difficulty: double-black
  elevation_range:
    min: 10000
    max: 12700
  center:
    lat: 35.84
    lng: -105.75
  geojson: /assets/areas/pecos-wilderness.geojson

- id: galisteo-basin
  name: Galisteo Basin
  tagline: Great views, smooth runs
  description: >-
    20 minutes South of Santa Fe is Galisteo Basin.
    This preserve is a popular recreation area for hikers, mountain bikers, and runners.
    The trails are rolling and fast without any major climbs.
    There are great ridge sections providing 360 degree views.
    The terrain is mostly open Juniper Savannah with little shade.
    We suggest running in the Fall, Winter, and Spring to avoid the heat of summer.
  difficulty: green
  elevation_range:
    min: 6300
    max: 6700
  center:
    lat: 35.46
    lng: -105.94
  geojson: /assets/areas/galisteo-basin.geojson

- id: nambe-badlands
  name: Nambe Badlands
  tagline: Geology, Solitude, & Vistas
  description: >-
    The Nambe Badlands, 30 minutes north of Santa Fe offer solitude, beautiful geological formations, and smooth runs.
    Very few crowds with incredible views of the Jemez and Sangre de Cristos.
    The terrain is sandy and open with little shade.
    We suggest running in the Fall, Winter, and Spring to avoid the heat of summer.
  difficulty: green
  elevation_range:
    min: 6000
    max: 6300
  center:
    lat: 35.94
    lng: -105.95
  geojson: /assets/areas/nambe-badlands.geojson

- id: caja-del-rio
  name: Caja del Rio
  tagline: Little visited Volcanic plateau
  description: >-
    Caja del Rio is Santa Fe's least-known running area--a broad volcanic plateau west of the city.
    Known for Diablo Canyon at its northern edge, the plateau also has a network of dirt roads.
    Very few people run here, but it's a great option for those looking for solitude and to explore less visited trail.
    The terrain is open Juniper Woodland. We suggest running in the Fall, Winter, and Spring to avoid the heat of summer.
  difficulty: blue
  elevation_range:
    min: 5500
    max: 7200
  center:
    lat: 35.74
    lng: -106.17
  geojson: /assets/areas/caja-del-rio.geojson
